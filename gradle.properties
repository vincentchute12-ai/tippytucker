package com.presence.mod.system;

public class SanityManager {

    public static float getVignetteIntensity(float sanity) {
        return Math.max(0f, (100f - sanity) / 100f) * 0.6f;
    }

    public static boolean shouldShowBreathingEffect(float sanity) {
        return sanity < 50;
    }

    public static boolean shouldShowEyeFlash(float sanity) {
        return sanity < 20;
    }

    public static String getSanityTier(float sanity) {
        if (sanity >= 80) return "STABLE";
        if (sanity >= 60) return "UNSETTLED";
        if (sanity >= 40) return "DISTURBED";
        if (sanity >= 20) return "BREAKING";
        return "SHATTERED";
    }
}
